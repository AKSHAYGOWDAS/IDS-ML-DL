<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Model Charts</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            margin: 0;
            color: white;
        }

        .navbar {
            background: #020617;
            padding: 15px 30px;
        }

        .navbar a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #38bdf8;
            margin-bottom: 40px;
        }

        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 40px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .card h3 {
            text-align: center;
            color: #4cc9f0;
            margin-bottom: 20px;
        }

        .card img {
            width: 100%;
            max-width: 900px;
            display: block;
            margin: auto;
            border-radius: 10px;
            background: white;
            padding: 10px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="{{ url_for('veremi_predict') }}">⬅ Back to Prediction</a>
</div>

<div class="container">

    <h2>📊 Model Performance Charts</h2>

    <!-- ===== Chart 1 ===== -->
    <div class="card">
        <h3>CNN Model Performance</h3>
        <img src="{{ url_for('static', filename='chart/cnn_performance.png') }}">
    </div>

    <!-- ===== Chart 2 ===== -->
    <div class="card">
        <h3>Model Comparison</h3>
        <img src="{{ url_for('static', filename='chart/model_comparison.png') }}">
    </div>

    <!-- ===== Chart 3 ===== -->
    <div class="card">
        <h3>XGBoost Performance</h3>
        <img src="{{ url_for('static', filename='chart/xgboost_performance.png') }}">
    </div>

</div>

</body>
</html>
